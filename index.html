<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코어림테크</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #000000; /* 이미지 배경이 검은색 계열이라 검은색이 자연스럽습니다 */
            text-align: center;
        }
        img { 
            display: block;
            margin: 0 auto;
            max-width: 100%; /* 가로 폭에 맞춰 크기 조절 */
            height: auto;    /* 세로 길이는 원본 비율대로 유지 (스크롤 생성) */
        }
    </style>
</head>
<body>
    <img src="Corerim.jpg" alt="Corerim Tech">
</body>
</html>
