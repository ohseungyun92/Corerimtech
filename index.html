<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코어림테크</title>

    <meta property="og:title" content="코어림테크">
    <meta property="og:description" content="Together for the Future of Semiconductor">
    <meta property="og:image" content="https://ohseungyun92.github.io/Corerimtech/Corerim4.jpg">
    <meta property="og:url" content="https://ohseungyun92.github.io/Corerimtech/">
    <meta property="og:type" content="website">

    <style>
        /* 배경을 검은색으로 설정하고 여백을 없앱니다 */
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #000000; 
            overflow-x: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        img {
            display: block;
            width: 100%;
            max-width: 100%; /* 화면 너비에 맞춤 */
            height: auto;
            opacity: 0; /* 처음에는 안 보이게 설정 */
            transform: translateY(50px); /* 50px 아래에서 시작 */
            animation: fadeInUp 1.5s ease forwards;
        }

        /* 아래에서 위로 올라오며 나타나는 애니메이션 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 1, 2, 3번 이미지가 순차적으로 나타나도록 시간 차이(지연) 부여 */
        .img1 { animation-delay: 0.3s; }
        .img2 { animation-delay: 1.0s; }
        .img3 { animation-delay: 1.7s; }
    </style>
</head>
<body>
    <div class="container">
        <img src="Corerim1.jpg" class="img1" alt="상단">
        <img src="Corerim2.jpg" class="img2" alt="중단">
        <img src="Corerim3.jpg" class="img3" alt="하단">
    </div>
</body>
</html>
