<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코어림테크</title>

    <!-- 🔥 카카오톡 썸네일 (OG 태그) -->
    <meta property="og:title" content="코어림테크">
    <meta property="og:description" content="Together for the Future of Semiconductor">
    <meta property="og:image" content="https://corerimtech.com/Corerim4.jpg">
    <meta property="og:url" content="https://corerimtech.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #000000; 
            overflow-x: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        img {
            display: block;
            width: 100%;
            max-width: 100%; 
            height: auto;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1.5s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .img1 { animation-delay: 0.3s; }
        .img2 { animation-delay: 1.0s; }
        .img3 { animation-delay: 1.7s; }
    </style>
</head>

<body>
    <div class="container">
        <img src="Corerim-01.jpg" class="img1" alt="상단">
        <img src="Corerim-02.jpg" class="img2" alt="중단">
        <img src="Corerim-03.jpg" class="img3" alt="하단">
    </div>
</body>
</html>
